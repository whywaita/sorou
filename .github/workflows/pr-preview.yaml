name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# 同じ PR に対する連続 push は直列化（古いジョブはキャンセル）
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  WORKER_NAME: sorou-pr-${{ github.event.pull_request.number }}
  DB_NAME: sorou-pr-${{ github.event.pull_request.number }}-db

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    # フォークからの PR は Secrets にアクセスできないためスキップ
    if: github.event.pull_request.head.repo.fork == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      # wrangler を PATH に追加（devDependency としてインストールされるため）
      - name: Add node_modules/.bin to PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      # 型チェック
      - name: Type check
        run: npx tsc --noEmit

      # テスト
      - name: Run tests
        run: npm test

      # D1 データベースの作成 or 取得
      - name: Create or get D1 database
        id: d1
        run: |
          set -e
          # 既存 DB の確認（wrangler d1 info のテキスト出力から UUID を抽出）
          if DB_INFO=$(wrangler d1 info "$DB_NAME" 2>&1); then
            echo "📦 D1 database '${DB_NAME}' already exists, reusing"
            DB_ID=$(echo "$DB_INFO" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          else
            echo "🆕 Creating D1 database '${DB_NAME}'"
            CREATE_OUT=$(echo 'y' | wrangler d1 create "$DB_NAME" 2>&1)
            echo "$CREATE_OUT"
            DB_ID=$(echo "$CREATE_OUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            echo "   database_id = ${DB_ID}"
          fi
          echo "db_id=${DB_ID}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # D1 マイグレーション適用
      - name: Apply D1 migrations
        run: |
          set -e
          for f in ./drizzle/migrations/*.sql; do
            echo "▶ Running migration: $f"
            wrangler d1 execute "$DB_NAME" --remote --file="$f"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # wrangler.pr-<N>.toml の生成（テンプレートからプレースホルダを置換）
      - name: Generate PR-specific wrangler config
        run: |
          CONFIG="wrangler.pr-${PR_NUMBER}.toml"
          sed -e "s/__WORKER_NAME__/${WORKER_NAME}/g" \
              -e "s/__D1_NAME__/${DB_NAME}/g" \
              -e "s/__D1_ID__/${{ steps.d1.outputs.db_id }}/g" \
              wrangler.pr.toml > "$CONFIG"
          echo "Generated $CONFIG"
          cat "$CONFIG"

      # Worker のデプロイ
      - name: Deploy to Cloudflare Workers
        id: deploy
        run: |
          CONFIG="wrangler.pr-${PR_NUMBER}.toml"
          DEPLOY_OUTPUT=$(wrangler deploy --config "$CONFIG" 2>&1)
          echo "$DEPLOY_OUTPUT"

          # workers.dev の URL を抽出
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.workers\.dev' | head -1)
          if [ -z "$PREVIEW_URL" ]; then
            echo "⚠ Could not extract workers.dev URL from deploy output"
            PREVIEW_URL="(URL could not be determined — check Actions log)"
          fi
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
          echo "🔗 ${PREVIEW_URL}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # PR にプレビュー URL をコメント
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const body = `🚀 プレビュー環境がデプロイされました

            🔗 ${url}

            > この環境は PR のたびに自動更新されます。PR がクローズされると自動的に削除されます。`;

            // 既存のプレビューコメントを探して更新（なければ新規作成）
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('プレビュー環境がデプロイされました')
              && c.user.type === 'Bot'
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
