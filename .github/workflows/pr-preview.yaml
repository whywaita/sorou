name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# 必要なし（PRコメントは行わず、Discord通知のみ）

# 同じ PR に対する連続 push は直列化（古いジョブはキャンセル）
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  WORKER_NAME: sorou-pr-${{ github.event.pull_request.number }}
  DB_NAME: sorou-pr-${{ github.event.pull_request.number }}-db

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    # フォークからの PR は Secrets にアクセスできないためスキップ
    if: github.event.pull_request.head.repo.fork == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      # wrangler を PATH に追加（devDependency としてインストールされるため）
      - name: Add node_modules/.bin to PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      # 型チェック
      - name: Type check
        run: npx tsc --noEmit

      # テスト
      - name: Run tests
        run: npm test

      # D1 データベースの再作成（毎回クリーンなDBを用意）
      - name: Recreate D1 database
        id: d1
        run: |
          set -e
          # 既存 DB があれば削除
          if wrangler d1 info "$DB_NAME" > /dev/null 2>&1; then
            echo "🗑 Deleting existing D1 database '${DB_NAME}'"
            echo 'y' | wrangler d1 delete "$DB_NAME" --skip-confirmation 2>&1 || true
          fi
          # 新規作成
          echo "🆕 Creating D1 database '${DB_NAME}'"
          CREATE_OUT=$(echo 'y' | wrangler d1 create "$DB_NAME" 2>&1)
          echo "$CREATE_OUT"
          DB_ID=$(echo "$CREATE_OUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if [ -z "$DB_ID" ]; then
            echo "❌ Failed to extract database ID from output"
            exit 1
          fi
          echo "   database_id = ${DB_ID}"
          echo "db_id=${DB_ID}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # D1 マイグレーション適用
      - name: Apply D1 migrations
        run: |
          set -e
          for f in ./drizzle/migrations/*.sql; do
            echo "▶ Running migration: $f"
            wrangler d1 execute "$DB_NAME" --remote --file="$f"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # wrangler.pr-<N>.toml の生成（テンプレートからプレースホルダを置換）
      - name: Generate PR-specific wrangler config
        run: |
          CONFIG="wrangler.pr-${PR_NUMBER}.toml"
          sed -e "s/__WORKER_NAME__/${WORKER_NAME}/g" \
              -e "s/__D1_NAME__/${DB_NAME}/g" \
              -e "s/__D1_ID__/${{ steps.d1.outputs.db_id }}/g" \
              wrangler.pr.toml > "$CONFIG"
          echo "Generated $CONFIG"
          cat "$CONFIG"

      # Worker のデプロイ
      - name: Deploy to Cloudflare Workers
        id: deploy
        run: |
          CONFIG="wrangler.pr-${PR_NUMBER}.toml"
          DEPLOY_OUTPUT=$(wrangler deploy --config "$CONFIG" 2>&1)
          echo "$DEPLOY_OUTPUT"

          # workers.dev の URL を抽出
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.workers\.dev' | head -1)
          if [ -z "$PREVIEW_URL" ]; then
            echo "⚠ Could not extract workers.dev URL from deploy output"
            PREVIEW_URL="(URL could not be determined — check Actions log)"
          fi
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
          echo "🔗 ${PREVIEW_URL}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # PR 番号とタイトルを取得（Discord 通知用）
      - name: Get PR title
        id: pr_info
        run: |
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title')
          echo "pr_title=${PR_TITLE}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      # Discord にプレビュー URL を通知
      - name: Notify preview URL to Discord
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          PR_TITLE: ${{ steps.pr_info.outputs.pr_title }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "embeds": [{
              "title": "🚀 プレビュー環境がデプロイされました",
              "description": "🔗 ${PREVIEW_URL}\n\n📋 **#${PR_NUMBER}** ${PR_TITLE}\n🌿 \`${BRANCH}\`",
              "color": 5763719,
              "footer": { "text": "sorou PR Preview" }
            }]
          }
          EOF
          )"
          echo "✅ Discord に通知を送信しました"
