name = "__WORKER_NAME__"
main = "src/index.ts"
compatibility_date = "2025-01-01"
# workers-og (satori + resvg) が Node.js 互換 API を必要とするため有効化
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "__D1_NAME__"
database_id = "__D1_ID__"
