name = "sorou"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[observability]
enabled = true
head_sampling_rate = 1

# ADMIN_PASSWORD は機密情報のため [vars] には置かず、Secret で管理する。
#   wrangler secret put ADMIN_PASSWORD
# 未設定時は管理画面が無効化される (F-27)。

[[d1_databases]]
binding = "DB"
database_name = "sorou-db"
database_id = "a9eabce5-dc4a-40b3-8c05-eb2cb1f553a6"
